            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg) translateX(0); }
            10% { transform: rotate(-2deg) translateX(-2px); }
            20% { transform: rotate(2deg) translateX(2px); }
            30% { transform: rotate(-2deg) translateX(-2px); }
            40% { transform: rotate(2deg) translateX(2px); }

            60% { transform: rotate(1deg) translateX(1px); }

            80% { transform: rotate(1deg) translateX(1px); }

        let currentBook = null;

        // 책 표지 로드 실패 시 placeholder 표시
        function handleImageError(img, bookTitle) {
            img.style.display = 'none';
            const container = img.parentElement;
            const placeholder = document.createElement('div');
            placeholder.className = 'book-placeholder';
            placeholder.innerHTML = `
                <svg class="book-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 5h16M6.5 7h7M6.5 11h7M6.5 15h4"/>
                </svg>
                <span class="text-sm font-medium">COEX 추천도서</span>
            `;
            container.appendChild(placeholder);
        }

        // 책 그리드 렌더링 (통합 레이아웃)
        function renderBooks() {
            const container = document.getElementById('bookContainer');
            let html = '';

            // Group 정의
            const groups = [
                {
                    title: "격변의 시대를 읽다",
                    description: "과학, AI, 무인 기술이 세상을 바꾸는 방식을 이해하는 책",
                    bookIndices: [0, 1, 2]
                },
                {
                    title: "경제와 산업의 흐름",
                    description: "혁신 생태계와 부동산 경제를 통해 미래 산업을 읽는 책",
                    bookIndices: [3, 4]
                },
                {
                    title: "대한민국 산업의 미래",
                    description: "반도체, 승부의 심리, 자신에게 집중하는 법을 다루는 책",
                    bookIndices: [5, 6, 7]
                },
                {
                    title: "나를 돌아보는 시간",
                    description: "완벽주의를 버리고 여성의 삶과 경험을 돌아보는 책",
                    bookIndices: [8, 9]
                }
            ];

            // 각 Group 렌더링
            groups.forEach((groupIndex, index) => {
                const group = groups[index];

                // 그룹 간 구분선 (첫 번째 그룹 제외)
                if (index > 0) {
                    html += `<div style="width: 100%; border-bottom: 1px solid #d1d5db; margin: 48px 0 48px 0;"></div>`;
                }

                // 그룹 제목 및 설명 (전체 너비)
                const descriptionFontSize = index === 0 ? '11.52px' : '14.4px';
                html += `
                    <div style="width: 100%; text-align: center; margin-bottom: 32px; padding: 0 20px;">
                        <h3 class="font-bold text-gray-900 mb-2" style="font-size: 16.8px;">${group.title}</h3>
                        <p class="text-gray-600" style="font-size: ${descriptionFontSize};">${group.description}</p>
                    </div>
                `;

                // 그룹 내 책들
                group.bookIndices.forEach((idx) => {
                    const book = books[idx];
                    html += `
                        <div class="flex flex-col items-center" style="width: 250px; height: 100%;">
                            <div class="book-card cursor-pointer rounded-lg overflow-hidden relative" onclick="openModal(${book.id})" style="width: 250px; min-height: 375px; display: flex; flex-direction: column;">
                                <div style="position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 10;">
                                    <span class="category-tag">${book.categoryTag}</span>
                                </div>
                                <div class="relative overflow-hidden bg-gray-200" style="aspect-ratio: 2/3; width: 250px; flex-shrink: 0;">
                                    <img
                                        src="${book.coverImage}"
                                        alt="${book.title}"
                                        class="book-cover"
                                        onerror="handleImageError(this, '${book.title}')"
                                    >
                                </div>
                            </div>
                            <div style="width: 250px; min-height: 56px; margin-top: 16px; display: flex; align-items: center; justify-content: center;">
                                <h3 class="font-bold text-gray-900 text-center" style="font-size: 24px !important; line-height: 1.5; word-break: keep-all;">${book.title}</h3>
                            </div>
                            <p class="text-gray-500 font-normal text-center" style="width: 250px; margin-top: 8px; font-size: 16px !important; line-height: 1.4 !important;">${book.author}</p>
                        </div>
                    `;
                });
            });

            container.innerHTML = html;
        }

        // 모달 열기
        function openModal(bookId) {
            const book = books.find(b => b.id === bookId);
            if (!book) return;

            currentBook = book;
            document.getElementById('modalCover').src = book.coverImage;
            document.getElementById('modalTitle').textContent = book.title;
            document.getElementById('modalSubtitle').textContent = book.subtitle;
            document.getElementById('modalAuthor').textContent = book.author;
            document.getElementById('modalDescription').textContent = book.description;
            document.getElementById('modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        // 모달 닫기
        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // ESC 키로 모달 닫기
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // 초기 렌더링
        renderBooks();
    </script>
